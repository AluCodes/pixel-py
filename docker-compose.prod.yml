version: '3.8'

services:
  fastapi-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-microservice-backend-prod
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=fastapi-microservice-backend
      - VERSION=1.0.0
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=WARNING
      - MAX_IMAGE_SIZE_MB=10
      - MAX_IMAGE_DIMENSION=4096
    # No volume mounts in production - code is baked into image
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend-network:
    driver: bridge
